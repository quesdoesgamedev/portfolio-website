    <style>
      /* ── Page layout ── */
      .projects-main {
        padding: 48px var(--_sizes---section--padding-horizontal, 60px);
        width: 100%;
        box-sizing: border-box;
      }

      /* ── Page header ── */
      .projects-page-header { margin-bottom: 40px; }

      .projects-back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--_typography---font-family--font-primary);
        font-size: var(--_typography---button--btn5);
        color: var(--primary-color--p-500);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 16px;
        transition: color 0.2s ease;
      }
      .projects-back-link:hover { color: var(--accent-color--a-500); }

      .projects-page-title {
        font-family: var(--_typography---font-family--font-primary);
        font-size: var(--_typography---heading--h2);
        color: var(--neutral-color--n-900);
        text-transform: uppercase;
        line-height: 1.1em;
        margin: 0 0 8px;
      }

      .projects-page-subtitle {
        font-family: var(--_typography---font-family--font-secondary);
        font-size: var(--_typography---bodytext--b1);
        color: var(--neutral-color--n-600);
        margin: 0;
      }

      .projects-page-accent {
        width: 48px;
        height: 4px;
        background-color: var(--accent-color--a-500);
        border-radius: 2px;
        margin: 16px 0 0;
      }

      /* ── Project grid ── */
      .projects-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      /* ── Project card ── */
      .proj-card {
        background-color: var(--primary-color--p-700);
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.25s cubic-bezier(.645,.045,.355,1),
                    box-shadow 0.25s cubic-bezier(.645,.045,.355,1);
      }
      .proj-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 40px rgba(79,25,235,0.35);
      }

      .proj-card-thumb {
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background-color: var(--primary-color--p-800);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .proj-card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .proj-card-thumb-icon {
        font-size: 48px;
        color: var(--primary-color--p-500);
      }

      .proj-card-body { padding: 18px 20px 20px; }

      .proj-card-title {
        font-family: var(--_typography---font-family--font-primary);
        font-size: var(--_typography---heading--h6);
        color: white;
        text-transform: uppercase;
        line-height: 1.3em;
        margin: 0;
      }

      .proj-card-accent {
        width: 28px;
        height: 3px;
        background-color: var(--accent-color--a-500);
        border-radius: 2px;
        margin-top: 10px;
        transition: width 0.3s cubic-bezier(.645,.045,.355,1);
      }
      .proj-card:hover .proj-card-accent { width: 100%; }

      /* ── Detail panel overlay ── */
      .proj-panel-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.65);
        z-index: 9000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .proj-panel-overlay.active {
        opacity: 1;
        pointer-events: all;
      }

      /* ── Detail panel ── */
      .proj-panel {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 480px;
        max-width: 100vw;
        background-color: white;
        overflow-y: auto;
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(.645,.045,.355,1);
        display: flex;
        flex-direction: column;
      }
      .proj-panel-overlay.active .proj-panel {
        transform: translateX(0);
      }

      .proj-panel-header {
        background-color: var(--primary-color--p-700);
        padding: 28px 28px 24px;
        position: relative;
        flex-shrink: 0;
      }

      .proj-panel-close {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: white;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 15px;
        transition: background 0.2s ease;
      }
      .proj-panel-close:hover { background: rgba(255, 255, 255, 0.3); }

      .proj-panel-thumb {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
        background-color: var(--primary-color--p-800);
        flex-shrink: 0;
      }
      .proj-panel-thumb-placeholder {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: var(--primary-color--p-800);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
        color: var(--primary-color--p-500);
        flex-shrink: 0;
      }

      .proj-panel-title {
        font-family: var(--_typography---font-family--font-primary);
        font-size: var(--_typography---heading--h4);
        color: white;
        text-transform: uppercase;
        line-height: 1.2em;
        margin: 16px 0 0;
        padding-right: 44px;
      }

      .proj-panel-body {
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        flex: 1;
      }

      .proj-panel-section {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .proj-panel-label {
        font-family: var(--_typography---font-family--font-primary);
        font-size: var(--_typography---button--btn6);
        color: var(--primary-color--p-500);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .proj-panel-text {
        font-family: var(--_typography---font-family--font-secondary);
        font-size: var(--_typography---bodytext--b1);
        color: var(--neutral-color--n-900);
        line-height: 1.65em;
        margin: 0;
        white-space: pre-line;
      }

      .proj-panel-divider {
        border: none;
        border-top: 1px solid var(--neutral-color--n-300);
        margin: 0;
      }

      .proj-panel-link-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background-color: var(--accent-color--a-500);
        color: var(--neutral-color--n-900);
        font-family: var(--_typography---font-family--font-primary);
        font-size: var(--_typography---button--btn4);
        text-transform: uppercase;
        text-decoration: none;
        padding: 18px 28px;
        width: fit-content;
        transition: background-color 0.3s cubic-bezier(.645,.045,.355,1);
        margin-top: 4px;
      }
      .proj-panel-link-btn:hover { background-color: var(--accent-color--a-600); }
      .proj-panel-link-btn.no-link {
        opacity: 0.4;
        pointer-events: none;
      }

      /* ── Responsive ── */
      @media (max-width: 991px) {
        .projects-grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 767px) {
        .projects-main { padding: 32px 24px; }
        .projects-grid { grid-template-columns: 1fr; }
        .proj-panel { width: 100vw; }
      }
    </style>

    <script>
      // ── ADD / EDIT YOUR PROJECTS HERE ──────────────────────────────────────
      // thumb: path to image file, or null for the default icon placeholder
      // link: URL string, or null to disable the button
      /* Projects to add from repository:

      - Project 1 (235)
      - Project 3 (235)

      - Halo Audio Visualizer (330)
      - HW4 NYS state park buddy (330)
      - Project 4; include documentation since its a physical computing project (470)
          - https://cgbigme470.wordpress.com/2025/04/30/project-4-smart-lock/

      - Include Physical computing website for funsies
      https://cgbigme470.wordpress.com/
      */
      const projects = [
        {
          title: "Cornucopia",
          thumb: "images\\cornucopia-thumb.jpg",
          icon: "fa-solid fa-dice-d20",
          description: "Cornucopia is a cooperative sci-fi board game with elements of survival, exploration, and horror. The game takes place in an abandoned factory on an alien planet where the players have crash landed. The goal is to explore the factory and collect scrap material to fix the thrusters, hull and computer and find the power core. While moving through the factory, players will need to avoid monsters, manage their resources and deal with hazardous events in order to escape alive. \n \nWhat makes our game unique is the method of exploring the factory. Unlike most other games that have a set board size or shape, Cornucopia is generated using a deck of tiles that make up the rooms, hallways, forks, and deadends of the factory. Whenever a player reaches an unexplored area, they draw a tile from the deck and place it on the board to reveal the area. With this method of map generation the players don’t know the size or shape of the factory, adding a layer of mystery and replayability. \n \nAs players make their way through the factory, they will acquire materials like scrap metal, batteries and oil that will be used to repair the ship. \n \nThis game was my first real attempt at designing and shipping not only a board game, but a large-scale game project. As lead designer, I had to manage a team of 4 other designers and artists, and work with them to create a cohesive game experience. I also had to manage the project timeline and make sure we were on track to finish the game by the end of the semester. This project was a great learning experience for me, and I am proud of what we accomplished as a team.\n \nThis game is available to play on the Steam Workshop, and the link to the game is provided below. The design document and how to play video are also provided.",
          role: "Lead Designer, Lead Artist, Narrative Designer, and Developer",
          date: "Jan 2024 – May 2024",
          link: "https://steamcommunity.com/sharedfiles/filedetails/?id=3193871253",
          links: [                                // optional extra buttons — omit or set to null to hide
            { label: "Design Document", url: "https://docs.google.com/document/d/1WX_L5G3g-VK4MC7nbQVlHHXSgVffR57bFyKuLOhqRxQ/edit?tab=t.0" },
            { label: "How to Play Video", url: "https://drive.google.com/file/d/1jrFpozonlkJA7WuD7RC19zO_9SHcfFP1/view" }
          ]
        },
        {
          title: "ENTROPY",
          thumb: "images\\entropy-thumb.png",
          icon: "fa-solid fa-rocket",
          description: "ENTROPY is a single player narrative-driven first person game featuring a custom-built zero gravity movement system and puzzle elements. The player takes the role of a crew member on an interstellar voyage in deep space, abruptly woken up from cryo sleep by the ships onboard AI. The AI warns there is severe damage done to the ship's compact nuclear reactor; caused by a foreign entity now roaming the ship’s corridors, stalking your every move and sound. Because of the damage done to the reactor, artificial gravity on the ship is no longer operational. Therefore, the player must navigate the ship in full zero gravity to survive. \n \nThis game is a group project between myself and 4 other peers in my major. ENTROPY started as a class project, but we decided to continue working on it after the Fall 2024 semester concluded. We took our project to the next level by partnering with RIT's MAGIC Maker program, an on-campus game incubation program designed to take student's projects from side project to a ready-to-ship game. Over the course of the summer, I worked alongside the main development team while taking on my own internship, tackling sound effects design, music, and UI/UX design. In the Fall of 2025, we entered the next stage of the program, working to prepare our game to release alongside our school obligations. Project files are available upon request.",
          role: "Sound Engineer, UI/UX Designer, and Developer",
          date: "Sep 2024 – Dec 2025",
          link: "https://noahsark13.itch.io/entropy"
        },
        {
          title: "Pokedex ++",
          thumb: "images\\pokedex-thumb.png",
          icon: "fa-solid fa-dice-d20",
          description: "Pokedex ++ is a small-scale project I built for my web app development class. My goal wasto practice my ability to use APIs and JavaScript. The website allows the user to search for a pokemon, move, or region from the Pokemon video game series and pulls search queries from PokeAPI, then returns the search information to the user. I built this project from scratch, using HTML, CSS, and JavaScript.",
          role: "Sole Developer",
          date: "Oct 2023",
          link: "https://people.rit.edu/cgb2920/235/project2/" //change this after getting project files off people.rit.edu
        },
        {
          title: "Chest Lock",
          thumb: "images\\smart-lock-thumb.png",
          icon: "fa-solid fa-lock",
          description: "Chest Lock is a physical computing project I built for my Physical Computing & Alt Interfaces Class. The project utilizes an Arduino ESP32 microcontroller, a servo motor, and a custom web application to create a smart lock system. The user can lock and unlock the chest using the web application, which communicates with the ESP32 over Bluetooth. This project allowed me to explore the intersection of hardware and software, as well as gain experience in web development and microcontroller programming. \n \nWhile the project is not available to use first-hand, I have included a link to the project documentation that extensively details the design and implementation of the smart lock system.",
          role: "Sole Developer",
          date: "Apr 2025",
          link: "https://people.rit.edu/~cgb2920/470/Project%204/", //change this after getting project files off people.rit.edu
          links: [
            { label: "Project Documentation", url: "https://cgbigme470.wordpress.com/2025/04/30/project-4-smart-lock/" }
          ]
        }
      ];
      // ───────────────────────────────────────────────────────────────────────

      function buildGrid() {
        const grid = document.getElementById('projects-grid');
        projects.forEach(function(p, i) {
          var icon = p.icon || 'fa-solid fa-code';
          var thumbHTML = p.thumb
            ? '<div class="proj-card-thumb"><img src="' + p.thumb + '" alt="' + p.title + '"></div>'
            : '<div class="proj-card-thumb"><div class="proj-card-thumb-icon"><i class="' + icon + '"></i></div></div>';

          var card = document.createElement('div');
          card.className = 'proj-card';
          card.setAttribute('role', 'button');
          card.setAttribute('tabindex', '0');
          card.innerHTML =
            thumbHTML +
            '<div class="proj-card-body">' +
              '<div class="proj-card-title">' + p.title + '</div>' +
              '<div class="proj-card-accent"></div>' +
            '</div>';
          card.addEventListener('click', function() { openPanel(i); });
          card.addEventListener('keydown', function(e) { if (e.key === 'Enter') openPanel(i); });
          grid.appendChild(card);
        });
      }

      function openPanel(idx) {
        var p = projects[idx];
        document.getElementById('panel-title').textContent = p.title;
        document.getElementById('panel-desc').textContent = p.description;
        document.getElementById('panel-role').textContent = p.role;
        document.getElementById('panel-date').textContent = p.date;

        var thumb = document.getElementById('panel-thumb');
        var placeholder = document.getElementById('panel-thumb-placeholder');
        if (p.thumb) {
          thumb.src = p.thumb;
          thumb.alt = p.title;
          thumb.style.display = 'block';
          placeholder.style.display = 'none';
        } else {
          thumb.style.display = 'none';
          placeholder.querySelector('i').className = p.icon || 'fa-solid fa-code';
          placeholder.style.display = 'flex';
        }

        var btn = document.getElementById('panel-link-btn');
        if (p.link) {
          btn.href = p.link;
          btn.classList.remove('no-link');
        } else {
          btn.href = '#';
          btn.classList.add('no-link');
        }

        var extraLinks = document.getElementById('panel-extra-links');
        extraLinks.innerHTML = '';
        if (p.links && p.links.length) {
          p.links.forEach(function(l) {
            var a = document.createElement('a');
            a.className = 'proj-panel-link-btn';
            a.href = l.url;
            a.target = '_blank';
            a.rel = 'noopener';
            a.innerHTML = '<i class="fa-solid fa-arrow-up-right-from-square"></i> ' + l.label;
            extraLinks.appendChild(a);
          });
        }

        document.getElementById('proj-panel-overlay').classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closePanel() {
        document.getElementById('proj-panel-overlay').classList.remove('active');
        document.body.style.overflow = '';
      }

      function handleOverlayClick(e) {
        if (e.target === document.getElementById('proj-panel-overlay')) closePanel();
      }

      document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

      buildGrid();
    </script>
